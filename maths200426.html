<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瑪利歐數學大冒險 (選擇題版)</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+TC:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mario-red: #E52521;
            --mario-blue: #5C94FC;
            --mario-green: #00A800;
            --mario-coin: #F8D820;
            --brick-color: #C84C0C;
        }

        body {
            background-color: var(--mario-blue);
            font-family: 'Noto Sans TC', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: #333;
        }

        .game-container {
            background-color: rgba(255, 255, 255, 0.95);
            border: 8px solid black;
            border-radius: 10px;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            z-index: 10;
        }

        /* 手機版響應式設計 */
        @media (max-width: 480px) {
            h1 { font-size: 18px !important; }
            .game-container { padding: 15px; border-width: 4px; }
            .question-box { font-size: 16px !important; }
            .options-grid { grid-template-columns: 1fr !important; } /* 手機版改為單行排列 */
        }

        h1 {
            font-family: 'Press Start 2P', cursive, 'Noto Sans TC';
            color: var(--mario-red);
            text-shadow: 2px 2px 0px black;
            font-size: 24px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        .level-indicator {
            font-family: 'Press Start 2P', cursive;
            background-color: var(--mario-green);
            color: white;
            padding: 5px 10px;
            border: 3px solid black;
        }

        .lives-indicator {
            font-size: 20px;
            letter-spacing: 5px;
        }

        .question-box {
            font-size: 20px;
            margin-bottom: 20px;
            line-height: 1.6;
            background: #f0f0f0;
            padding: 15px;
            border: 4px dashed var(--brick-color);
            border-radius: 10px;
        }

        /* 選擇題按鈕網格佈局 */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-btn {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: white;
            color: #333;
            border: 4px solid var(--mario-blue);
            border-radius: 8px;
            padding: 15px 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 0px black;
            transition: all 0.1s;
        }

        .option-btn:hover {
            background-color: var(--mario-coin);
            border-color: var(--brick-color);
        }

        .option-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px black;
        }

        button.sys-btn {
            font-family: 'Press Start 2P', cursive, 'Noto Sans TC';
            background-color: var(--mario-red);
            color: white;
            border: 4px solid black;
            padding: 15px 30px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 4px 4px 0px black;
            transition: transform 0.1s;
        }

        button.sys-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px black;
        }

        #leaderboard, #game-over {
            display: none;
        }
        
        .score-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .score-table th, .score-table td {
            border: 2px solid black;
            padding: 10px;
            text-align: center;
        }
        .score-table th {
            background-color: var(--mario-coin);
        }
        .highlight {
            background-color: #ffeb3b;
            font-weight: bold;
            color: var(--mario-red);
        }

        .star {
            position: absolute;
            top: -50px;
            font-size: 30px;
            color: var(--mario-coin);
            text-shadow: 2px 2px 0 #000;
            animation: fall linear forwards;
            z-index: 100;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="game-container" id="game-ui">
        <h1>超級數學冒險</h1>
        
        <div class="status-bar">
            <div class="level-indicator">World 1-<span id="level-num">1</span></div>
            <div class="lives-indicator" id="lives-display">❤️❤️❤️</div>
        </div>
        
        <div class="question-box" id="question-text">載入中...</div>
        
        <div class="options-grid" id="options-container">
            </div>
    </div>

    <div class="game-container" id="game-over">
        <h1>💀 GAME OVER 💀</h1>
        <p>哎呀！生命值耗盡了...</p>
        <p>庫巴把公主抓走了！</p>
        <button class="sys-btn" style="margin-top:20px; background-color: #555;" onclick="location.reload()">重新挑戰</button>
    </div>

    <div class="game-container" id="leaderboard">
        <h1>🏆 破關龍虎榜 🏆</h1>
        <p>恭喜你！拯救了數學王國！</p>
        <p>你的通關時間：<span id="player-time" style="color:var(--mario-red); font-size: 24px;"></span> 秒</p>
        
        <table class="score-table">
            <tr><th>排名</th><th>玩家</th><th>時間 (秒)</th></tr>
            <tr><td>1</td><td>Mario</td><td>45</td></tr>
            <tr><td>2</td><td>Luigi</td><td>58</td></tr>
            <tr class="highlight"><td>3</td><td>你 (You)</td><td id="lb-player-time"></td></tr>
            <tr><td>4</td><td>Toad</td><td>120</td></tr>
            <tr><td>5</td><td>Bowser</td><td>999</td></tr>
        </table>
        
        <button class="sys-btn" style="margin-top:20px; background-color: var(--mario-green);" onclick="location.reload()">再玩一次</button>
    </div>

    <script>
        // Web Audio API 音效合成器
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playCoinSound() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(987.77, audioCtx.currentTime); 
            osc.frequency.setValueAtTime(1318.51, audioCtx.currentTime + 0.1); 
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function playWrongSound() {
            initAudio();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime); 
            osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.3);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
            osc.stop(audioCtx.currentTime + 0.3);
        }

        // 升級後的題庫：包含題目 (q)、四個選項 (options)，以及正確答案的索引值 (correctIndex: 0~3)
        const questions = [
            { 
                q: "飛機每小時可飛行 476 公里，18 小時共可飛行多少公里？", 
                options: ["A. 8468", "B. 8568", "C. 8668", "D. 7568"], 
                correctIndex: 1 
            },
            { 
                q: "5 和 14 的最小公倍數是甚麼？", 
                options: ["A. 35", "B. 70", "C. 140", "D. 60"], 
                correctIndex: 1 
            },
            { 
                q: "88 × 43 = ?", 
                options: ["A. 3684", "B. 3764", "C. 3784", "D. 3884"], 
                correctIndex: 2 
            },
            { 
                q: "滑浪風帆每小時的租金是 135 元。上星期共租出了 49 小時，共得租金多少元？", 
                options: ["A. 6515", "B. 6605", "C. 6615", "D. 6715"], 
                correctIndex: 2 
            },
            { 
                q: "624 箱橙，平均分給 12 輛貨車運載，每輛貨車運載橙多少箱？", 
                options: ["A. 42", "B. 52", "C. 54", "D. 62"], 
                correctIndex: 1 
            },
            { 
                q: "牛丸 312 粒，每打裝成一包，共可裝成多少包？", 
                options: ["A. 24", "B. 26", "C. 28", "D. 36"], 
                correctIndex: 1 
            },
            { 
                q: "菲林每卷售22元，叔叔有122元，最多可以買菲林 A 卷，餘下 B 元。", 
                options: ["A. A=5, B=2", "B. A=4, B=12", "C. A=5, B=12", "D. A=6, B=10"], 
                correctIndex: 2 
            },
            { 
                q: "下列哪些描述必定正確？<br>I. 兩個相同的等邊三角形可合併成一個菱形。<br>II. 一個菱形可分割成兩個相同的等邊三角形。", 
                options: ["A. 只有 I", "B. 只有 II", "C. I 和 II 皆是", "D. I 和 II 皆不是"], 
                correctIndex: 0 
            }, 
            { 
                q: "即食麵每箱有24包，173箱共有多少包？", 
                options: ["A. 4052", "B. 4142", "C. 4152", "D. 4252"], 
                correctIndex: 2 
            },
            { 
                q: "一條長 84 厘米的繩平均分成 21 段，每段長多少厘米？", 
                options: ["A. 3", "B. 4", "C. 5", "D. 6"], 
                correctIndex: 1 
            }
        ];

        let currentLevel = 0;
        let startTime = 0;
        let lives = 3;

        function initGame() {
            startTime = Date.now();
            updateLivesDisplay();
            loadQuestion();
        }

        function updateLivesDisplay() {
            document.getElementById("lives-display").innerText = "❤️".repeat(lives) + "🖤".repeat(3 - lives);
        }

        function loadQuestion() {
            document.getElementById("level-num").innerText = currentLevel + 1;
            document.getElementById("question-text").innerHTML = questions[currentLevel].q;
            
            // 清空並動態生成四選一的按鈕
            const optionsContainer = document.getElementById("options-container");
            optionsContainer.innerHTML = "";
            
            questions[currentLevel].options.forEach((optionText, index) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerHTML = optionText;
                // 設定點擊事件，傳入玩家選擇的索引
                btn.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(btn);
            });
        }

        // 檢查答案的邏輯改為比對索引值
        function checkAnswer(selectedIndex) {
            let correctIndex = questions[currentLevel].correctIndex;

            if (selectedIndex === correctIndex) {
                playCoinSound();
                createStarRain();
                currentLevel++;
                
                if (currentLevel < questions.length) {
                    setTimeout(loadQuestion, 800);
                } else {
                    setTimeout(showLeaderboard, 1000);
                }
            } else {
                playWrongSound();
                lives--;
                updateLivesDisplay();
                
                if (lives > 0) {
                    alert(`🍄 哎呀！答錯了！\n扣除一顆愛心，你還有 ${lives} 次機會！`);
                } else {
                    showGameOver();
                }
            }
        }

        function showGameOver() {
            document.getElementById("game-ui").style.display = "none";
            document.getElementById("game-over").style.display = "block";
        }

        function showLeaderboard() {
            let endTime = Date.now();
            let timeTaken = Math.floor((endTime - startTime) / 1000);
            
            document.getElementById("game-ui").style.display = "none";
            document.getElementById("leaderboard").style.display = "block";
            
            document.getElementById("player-time").innerText = timeTaken;
            document.getElementById("lb-player-time").innerText = timeTaken;
            
            for(let i=0; i<3; i++) {
                setTimeout(createStarRain, i*500);
            }
        }

        function createStarRain() {
            const numStars = 30;
            for (let i = 0; i < numStars; i++) {
                let star = document.createElement("div");
                star.innerHTML = "★";
                star.className = "star";
                star.style.left = Math.random() * 100 + "vw";
                let duration = Math.random() * 2 + 1;
                star.style.animationDuration = duration + "s";
                star.style.fontSize = (Math.random() * 20 + 20) + "px";
                document.body.appendChild(star);
                setTimeout(() => star.remove(), duration * 1000);
            }
        }

        window.onload = initGame;
    </script>
</body>
</html>
