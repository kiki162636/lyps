<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>漢字時光機 - 互動學習</title>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background: #f0f8ff; text-align: center; }
        .container { display: flex; justify-content: center; gap: 20px; margin-top: 50px; }
        .card {
            background: white; border-radius: 15px; padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s;
            cursor: pointer; width: 150px;
        }
        .card:hover { transform: translateY(-10px); background: #fff9c4; }
        .origin-img { font-size: 50px; display: block; margin-bottom: 10px; }
        .char { font-size: 60px; font-weight: bold; color: #2c3e50; }
        .btn-audio { margin-top: 10px; padding: 5px 10px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>🏮 漢字時光機 🏮</h1>
    <p>點擊字卡，聽聽廣東話點樣讀！</p>

    <div class="container">
        <div class="card" onclick="speak('山')">
            <span class="origin-img">⛰️</span>
            <span class="char">山</span>
            <button class="btn-audio">🔊 廣東話</button>
        </div>

        <div class="card" onclick="speak('火')">
            <span class="origin-img">🔥</span>
            <span class="char">火</span>
            <button class="btn-audio">🔊 廣東話</button>
        </div>

        <div class="card" onclick="speak('木')">
            <span class="origin-img">🌳</span>
            <span class="char">木</span>
            <button class="btn-audio">🔊 廣東話</button>
        </div>
    </div>

    <script>
        function speak(text) {
            const msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'zh-HK'; // 設定為廣東話
            msg.rate = 0.8;      // 稍微放慢語速，方便學習
            window.speechSynthesis.speak(msg);
        }
    </script>
</body>
</html>
