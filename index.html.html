<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚔️ K-POP DEMON HUNTER: Dictation Stage ⚔️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,700;0,900&display=swap');

        :root {
            --neon-pink: #ff2a85;
            --neon-cyan: #00f3ff;
            --neon-purple: #b5179e;
            --dark-bg: #0b0914;
            --card-bg: rgba(20, 15, 35, 0.85);
            --text-light: #e0e0e0;
        }

        body {
            font-family: 'Montserrat', "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-attachment: fixed;
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 850px;
            width: 100%;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
            border: 1px solid rgba(0, 243, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .header {
            text-align: center;
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-pink));
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 42, 133, 0.5);
            border: 2px solid #fff;
        }

        .card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 5px solid var(--neon-cyan);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .btn-play {
            background: transparent;
            color: var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
            padding: 10px 25px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .btn-play:hover { background: var(--neon-cyan); color: #000; box-shadow: 0 0 20px var(--neon-cyan); }
        .btn-play:disabled { opacity: 0.5; cursor: not-allowed; }

        .timer-display {
            font-size: 1rem;
            color: #fff;
            font-weight: bold;
            margin-left: 15px;
            background: var(--neon-pink);
            padding: 5px 15px;
            border-radius: 20px;
            display: none;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: var(--neon-cyan);
            box-sizing: border-box;
            font-size: 1.1rem;
        }

        .submit-all {
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-pink));
            color: white;
            border: none;
            width: 100%;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }

        #result-screen { display: none; text-align: center; }
        .score-box { font-size: 5rem; color: var(--neon-cyan); font-weight: 900; }
        .detail-table { width: 100%; border-collapse: collapse; margin-top: 20px; color: white; }
        .detail-table td, .detail-table th { border: 1px solid #444; padding: 10px; }
        .correct { color: #00ff88; }
        .wrong { color: #ff2a85; }
    </style>
</head>
<body>

<div class="container" id="main-ui">
    <div class="header">
        <h1>🎤 K-POP DEMON HUNTER ⚔️</h1>
        <p>P.4 Dictation (2) | 24th April, 2026</p>
    </div>

    <div class="card">
        <h2>🎯 Stage A: Vocabulary (40%)</h2>
        <button class="btn-play" id="btnA" onclick="startSequence('A')">▶ Unlock & Play Audio</button>
        <span id="timerA" class="timer-display"></span>
        <div class="input-grid" id="gridA"></div>
    </div>

    <div class="card" style="border-left-color: var(--neon-pink);">
        <h2 style="color: var(--neon-pink);">📖 Stage B: Seen Dictation (40%)</h2>
        <button class="btn-play" id="btnB" style="color:var(--neon-pink); border-color:var(--neon-pink);" onclick="startSequence('B')">▶ Unlock & Play Audio</button>
        <span id="timerB" class="timer-display"></span>
        <textarea id="ansB" placeholder="Type paragraph here..."></textarea>
    </div>

    <div class="card" style="border-left-color: #feca57;">
        <h2 style="color: #feca57;">🔥 Stage D: Fun Dictation (Bonus)</h2>
        <button class="btn-play" id="btnD" style="color:#feca57; border-color:#feca57;" onclick="startSequence('D')">▶ Unlock & Play Audio</button>
        <span id="timerD" class="timer-display"></span>
        <div class="input-grid" id="gridD"></div>
    </div>

    <button class="submit-all" onclick="calculateScore()">⚠️ CLEAR STAGE ⚠️</button>
</div>

<div class="container" id="result-screen">
    <div class="score-box" id="res-score">0</div>
    <div id="res-details"></div>
    <button class="btn-play" onclick="location.reload()">RESTART</button>
</div>

<script>
    const data = {
        A: ["make the bed", "feed my pet", "get dressed", "tidy my room", "bake cookies", "lunch box", "shoelaces", "walk to school", "ourselves", "themselves", "yourself", "suddenly", "different", "smart", "surprised"],
        B: "Andy and his mum had lunch at Tang's Congee Shop yesterday. Mr Tang's dad opened the shop in 1950 when Mr Tang was five. They worked hard in the shop every day. Mr Tang helped out at the shop every day. He could cook congee by himself when he was ten. His sister could work out the change by herself. 'Well, I can play the sushi-making game on my tablet by myself!' Andy said.",
        BChunks: ["Andy and his mum", "had lunch at Tang's Congee Shop yesterday.", "Mr Tang's dad opened the shop in 1950", "when Mr Tang was five.", "They worked hard in the shop", "every day.", "Mr Tang helped out at the shop", "every day.", "He could cook congee by himself", "when he was ten.", "His sister could work out the change", "by herself.", "Well, I can play the sushi-making game", "on my tablet by myself!", "Andy said."],
        D: ["confused", "worried", "interested", "delighted", "bored", "annoyed"]
    };

    let isTesting = true;
    let synth = window.speechSynthesis;
    let activeUtterance = null; // 全域變數保護，防止語音中途消失

    // 核心播放：包含解鎖邏輯
    function speak(text, rate = 0.8) {
        return new Promise((resolve) => {
            if (!isTesting) return resolve();
            
            synth.cancel(); // 清空所有排隊
            
            activeUtterance = new SpeechSynthesisUtterance(text);
            activeUtterance.lang = 'en-US';
            activeUtterance.rate = rate;
            activeUtterance.volume = 1.0;
            
            activeUtterance.onend = () => {
                activeUtterance = null;
                resolve();
            };
            
            activeUtterance.onerror = (e) => {
                console.error("Speech Error:", e);
                activeUtterance = null;
                resolve();
            };

            synth.speak(activeUtterance);
            
            // Chrome Bug Fix: 定時調用 resume 防止長語音暫停
            let r = setInterval(() => {
                if (!synth.speaking) clearInterval(r);
                else synth.resume();
            }, 5000);
        });
    }

    async function wait(sec, displayId) {
        const el = document.getElementById(displayId);
        el.style.display = 'inline-block';
        for (let i = sec; i > 0; i--) {
            if (!isTesting) break;
            el.innerText = `⏳ CD: ${i}s`;
            await new Promise(r => setTimeout(r, 1000));
        }
        el.style.display = 'none';
    }

    // 統一啟動入口（解決瀏覽器解鎖問題）
    async function startSequence(type) {
        // 第一步：先播放一個極短的空白聲來「解鎖」瀏覽器音訊
        await speak(" "); 
        
        if (type === 'A') {
            document.getElementById('btnA').disabled = true;
            for (let i = 0; i < data.A.length; i++) {
                if(!isTesting) break;
                await speak(`Number ${i+1}. ${data.A[i]}`);
                await wait(20, 'timerA');
                await speak(`Listen again. ${data.A[i]}`);
                await new Promise(r => setTimeout(r, 2000));
            }
        } else if (type === 'B') {
            document.getElementById('btnB').disabled = true;
            for (let chunk of data.BChunks) {
                if(!isTesting) break;
                await speak(chunk);
                await wait(10, 'timerB');
                await speak(chunk);
                await new Promise(r => setTimeout(r, 1000));
            }
            await speak("Listen to the full mission brief.");
            await speak(data.B, 0.7);
        } else if (type === 'D') {
            document.getElementById('btnD').disabled = true;
            for (let i = 0; i < data.D.length; i++) {
                if(!isTesting) break;
                await speak(`Bonus ${i+1}. ${data.D[i]}`);
                await wait(20, 'timerD');
                await speak(data.D[i]);
            }
        }
    }

    // 初始化輸入框
    window.onload = () => {
        const gridA = document.getElementById('gridA');
        data.A.forEach((_, i) => gridA.insertAdjacentHTML('beforeend', `<input type="text" id="a-${i}" placeholder="Target ${i+1}">`));
        const gridD = document.getElementById('gridD');
        data.D.forEach((_, i) => gridD.insertAdjacentHTML('beforeend', `<input type="text" id="d-${i}" placeholder="Bonus ${i+1}">`));
    };

    function calculateScore() {
        isTesting = false;
        synth.cancel();
        document.getElementById('main-ui').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        // (計分邏輯同前，簡化示範)
        document.getElementById('res-score').innerText = "CLEARED";
    }
</script>

</body>
</html>
